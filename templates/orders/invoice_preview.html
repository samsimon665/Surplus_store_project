<div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
">

    <h2 style="
        margin:0;
        font-weight:600;
        font-size:22px;
    ">
        Invoice Preview
    </h2>

    <a href="{% url 'orders:download_invoice' order.uuid %}" style="
            display:inline-flex;
            align-items:center;
            gap:8px;
            padding:10px 18px;
            background:#111;
            color:#fff;
            border-radius:6px;
            text-decoration:none;
            font-size:14px;
            font-weight:500;
            transition:0.2s;
       " onmouseover="this.style.background='#333'" onmouseout="this.style.background='#111'">
        ⬇ Download PDF
    </a>

</div>

<hr style="margin-bottom:25px;">

<!-- Invoice -->
<div style="
    background:#fff;
    padding:20px;
    border-radius:6px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
">
    {% include "orders/invoice_pdf.html" %}
</div>
